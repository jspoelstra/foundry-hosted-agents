# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

requiredVersions:
    extensions:
        azure.ai.agents: '>=1.0.0-beta.4'
name: seattle-travel-agent
services:
    ai-project:
        host: azure.ai.project
        deployments:
            - model:
                format: OpenAI
                name: gpt-5.4-mini
                version: "2026-03-17"
              name: gpt-5.4-mini
              sku:
                capacity: 10
                name: GlobalStandard
    seattle-travel-agent:
        project: .
        host: azure.ai.agent
        language: python
        uses:
            - ai-project
        codeConfiguration:
            entryPoint: main.py
            runtime: python_3_13
        container:
            resources:
                cpu: "0.5"
                memory: 1Gi
        description: A simple hosted agent sample with two local tools.
        environmentVariables:
            - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
              value: ${AZURE_AI_MODEL_DEPLOYMENT_NAME}
            - name: FOUNDRY_PROJECT_ENDPOINT
              value: ${FOUNDRY_PROJECT_ENDPOINT}
        kind: hosted
        metadata:
            tags:
                - Agent Framework
                - Foundry Hosted Agent
                - Responses Protocol
                - Local Tools
        name: seattle-travel-agent
        protocols:
            - protocol: responses
              version: 2.0.0
infra:
    provider: microsoft.foundry
